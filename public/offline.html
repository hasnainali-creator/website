<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OmnySports — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0a0a0a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem;
    }
    .container { max-width: 420px; }
    .icon { font-size: 4rem; margin-bottom: 1.5rem; opacity: 0.7; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.75rem; color: #fff; }
    p { font-size: 0.95rem; line-height: 1.6; color: #999; margin-bottom: 1.5rem; }
    .retry-btn {
      display: inline-block;
      padding: 0.75rem 2rem;
      background: #fff;
      color: #0a0a0a;
      border: none;
      border-radius: 8px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s;
    }
    .retry-btn:hover { opacity: 0.85; }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📡</div>
    <h1>You're Offline</h1>
    <p>It looks like you've lost your internet connection. Don't worry — OmnySports will be right back when you're online.</p>
    <a href="/" class="retry-btn" onclick="location.reload(); return false;">Try Again</a>
  </div>
</body>
</html>
